services:
  - type: web
    name: dutchmate-backend
    runtime: node
    plan: free
    buildCommand: corepack pnpm install --frozen-lockfile
    startCommand: corepack pnpm backend:start
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: TRANSLATION_PROVIDER
        value: mymemory
      - key: MYMEMORY_SOURCE_LANGUAGE
        value: nl
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 60
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
