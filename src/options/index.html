<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hover Translate Options</title>
    <script type="module" src="./index.ts"></script>
  </head>
  <body>
    <main class="options-shell">
      <h1>Hover Translate</h1>

      <form id="options-form">
        <label>
          Target language
          <select id="target-language" name="targetLanguage">
            <option value="en">English</option>
            <option value="nl">Dutch</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
          </select>
        </label>

        <label>
          Provider endpoint
          <input id="provider-endpoint" name="providerEndpoint" type="url" placeholder="Future API endpoint" />
        </label>

        <label>
          Provider API key
          <input id="provider-api-key" name="providerApiKey" type="password" placeholder="Stored locally later" />
        </label>

        <div class="form-actions">
          <button type="submit">Save</button>
          <button id="test-endpoint" type="button" class="secondary-button">Test endpoint</button>
        </div>
        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>
  </body>
</html>
