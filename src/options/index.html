<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hover Translate Options</title>
    <script type="module" src="./index.ts"></script>
  </head>
  <body>
    <main class="options-shell">
      <h1>Hover Translate</h1>

      <form id="options-form">
        <fieldset>
          <legend>Behavior</legend>

          <label class="checkbox-label">
            <input id="is-enabled" name="isEnabled" type="checkbox" />
            Enable extension
          </label>

          <label class="checkbox-label">
            <input id="translate-on-hover" name="translateOnHover" type="checkbox" />
            Translate on hover
          </label>

          <label class="checkbox-label">
            <input id="translate-on-selection" name="translateOnSelection" type="checkbox" />
            Translate selected text
          </label>
        </fieldset>

        <fieldset>
          <legend>Tuning</legend>

          <label class="range-label">
            <span class="range-label-row">
              Hover delay
              <output id="hover-delay-value" for="hover-delay-ms"></output>
            </span>
            <input id="hover-delay-ms" name="hoverDelayMs" type="range" min="150" max="1500" step="50" />
          </label>

          <label class="range-label">
            <span class="range-label-row">
              Max selected text length
              <output id="max-selection-length-value" for="max-selection-length"></output>
            </span>
            <input id="max-selection-length" name="maxSelectionLength" type="range" min="50" max="3000" step="50" />
          </label>
        </fieldset>

        <label>
          Target language
          <select id="target-language" name="targetLanguage">
            <option value="en">English</option>
            <option value="nl">Dutch</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
          </select>
        </label>

        <label>
          Provider endpoint
          <input id="provider-endpoint" name="providerEndpoint" type="url" placeholder="Future API endpoint" />
        </label>

        <label>
          Provider API key
          <input id="provider-api-key" name="providerApiKey" type="password" placeholder="Stored locally later" />
        </label>

        <div class="form-actions">
          <button type="submit">Save</button>
          <button id="test-endpoint" type="button" class="secondary-button">Test endpoint</button>
        </div>
        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>
  </body>
</html>
