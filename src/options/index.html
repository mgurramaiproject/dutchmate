<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DutchMate Options</title>
    <script type="module" src="./index.ts"></script>
  </head>
  <body>
    <main class="options-shell">
      <h1>DutchMate</h1>

      <form id="options-form">
        <fieldset>
          <legend>Behavior</legend>

          <label class="checkbox-label">
            <input id="is-enabled" name="isEnabled" type="checkbox" />
            Enable extension
          </label>

          <label class="checkbox-label">
            <input id="translate-on-hover" name="translateOnHover" type="checkbox" />
            Translate on hover
          </label>

          <label class="checkbox-label">
            <input id="translate-on-selection" name="translateOnSelection" type="checkbox" />
            Translate selected text
          </label>
        </fieldset>

        <fieldset>
          <legend>Tuning</legend>

          <label>
            Hover translation mode
            <select id="hover-translation-mode" name="hoverTranslationMode">
              <option value="sentence">Sentence</option>
              <option value="word">Word</option>
            </select>
          </label>

          <label class="range-label">
            <span class="range-label-row">
              Hover delay
              <output id="hover-delay-value" for="hover-delay-ms"></output>
            </span>
            <input id="hover-delay-ms" name="hoverDelayMs" type="range" min="150" max="1500" step="50" />
          </label>

          <label class="range-label">
            <span class="range-label-row">
              Max selected text length
              <output id="max-selection-length-value" for="max-selection-length"></output>
            </span>
            <input id="max-selection-length" name="maxSelectionLength" type="range" min="50" max="150" step="50" />
          </label>
        </fieldset>

        <fieldset>
          <legend>Languages</legend>

          <label>
            Source language
            <select id="source-language" name="sourceLanguage"></select>
          </label>

          <label>
            Target language
            <select id="target-language" name="targetLanguage"></select>
          </label>

          <label class="checkbox-label">
            <input
              id="translate-to-other-mvp-languages"
              name="translateToOtherMvpLanguages"
              type="checkbox"
            />
            Show the other two MVP languages
          </label>
        </fieldset>

        <details class="advanced-settings">
          <summary>Advanced local testing</summary>

          <fieldset>
            <p class="settings-note">
              Optional local backend override for development and support testing.
            </p>

            <label>
              Provider endpoint
              <input id="provider-endpoint" name="providerEndpoint" type="url" placeholder="https://dutchmate-backend.onrender.com/translate" />
            </label>

            <label>
              Provider API key
              <input id="provider-api-key" name="providerApiKey" type="password" placeholder="Optional for local testing" />
            </label>

            <div class="form-actions">
              <button id="test-endpoint" type="button" class="secondary-button">Test endpoint</button>
            </div>
          </fieldset>
        </details>

        <fieldset>
          <legend>Privacy</legend>

          <div class="cache-control">
            <span id="cache-count">Cached words: 0</span>
            <button id="clear-cache" type="button" class="secondary-button">Clear translation cache</button>
          </div>

          <p class="settings-note">
            DutchMate stores selected single words locally. Hovered words and selected phrases or sentences are not saved.
          </p>
        </fieldset>

        <div class="form-actions">
          <button type="submit">Save</button>
        </div>

        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>
  </body>
</html>
