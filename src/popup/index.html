<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DutchMate Learn</title>
    <script type="module" src="./index.ts"></script>
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div class="brand">
          <img src="../../public/icons/icon-48.png" alt="" width="29" height="29" />
          <span>DutchMate</span>
        </div>
        <div class="header-actions"><span id="due-badge" class="due-badge" role="status" hidden aria-label="Items due for review"></span><button id="settings-button" class="header-button" type="button" aria-label="Open settings">Settings</button></div>
      </header>
      <nav id="primary-navigation" class="tabs" role="tablist" aria-label="Learning areas">
        <button id="today-tab" class="tab is-active" type="button" role="tab" aria-selected="true" tabindex="0">Today</button>
        <button id="lessons-tab" class="tab" type="button" role="tab" aria-selected="false" tabindex="-1">Lessons</button>
      </nav>
      <div id="popup-content" class="popup-content" role="tabpanel" tabindex="0" aria-labelledby="today-tab" aria-live="polite"></div>
    </main>
  </body>
</html>
